<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="78%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#047857" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#0b0c16" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#fbfbfd"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo -->
  <g transform="translate(80,74)">
    <rect width="44" height="44" rx="11" fill="#047857"/>
    <rect x="9.6" y="9.6" width="24.8" height="24.8" rx="4" fill="#ffffff"/>
    <path d="M9.6 18h24.8M19.2 18v16.4" stroke="#047857" stroke-width="3.2" stroke-linecap="round"/>
    <text x="60" y="31" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#0b0c12">Tollgate</text>
  </g>

  <!-- Headline -->
  <text x="80" y="282" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="66" font-weight="700" fill="#0b0c12" letter-spacing="-2">Bill for exactly</text>
  <text x="80" y="356" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="66" font-weight="700" fill="#0b0c12" letter-spacing="-2">what they use.</text>

  <!-- Subhead -->
  <text x="82" y="416" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="27" font-weight="400" fill="#545a6a">Usage-based billing for APIs, without a billing team.</text>

  <!-- Pill -->
  <g transform="translate(82,452)">
    <rect width="262" height="46" rx="23" fill="#e6f5ef"/>
    <text x="26" y="30" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="20" font-weight="600" fill="#047857">Meter. Price. Invoice.</text>
  </g>

  <!-- Code window -->
  <g transform="translate(726,150)" filter="url(#shadow)">
    <rect width="394" height="330" rx="20" fill="#ffffff" stroke="#e6e7ee" stroke-width="1"/>
    <rect width="394" height="46" rx="20" fill="#f4f5f8"/>
    <rect y="30" width="394" height="16" fill="#f4f5f8"/>
    <circle cx="28" cy="23" r="5" fill="#c8ccd6"/>
    <circle cx="46" cy="23" r="5" fill="#d4d8e0"/>
    <circle cx="64" cy="23" r="5" fill="#dfe2e9"/>
    <text x="86" y="28" font-family="'Geist Mono','Cascadia Code',monospace" font-size="13" fill="#8b909f">usage.ts</text>

    <text font-family="'Geist Mono','Cascadia Code',monospace" font-size="15.5" fill="#0b0c12">
      <tspan x="26" y="92" fill="#8b909f">// one line where usage happens</tspan>
      <tspan x="26" y="122"><tspan fill="#047857">await</tspan> meter.<tspan fill="#0b0c12">record</tspan>({</tspan>
      <tspan x="46" y="150">metric: <tspan fill="#047857">"api_calls"</tspan>,</tspan>
      <tspan x="46" y="178">quantity: <tspan fill="#0b0c12">1</tspan>,</tspan>
      <tspan x="26" y="206">})</tspan>
    </text>

    <line x1="24" y1="244" x2="370" y2="244" stroke="#e6e7ee" stroke-width="1"/>
    <text x="26" y="282" font-family="'Geist Mono',monospace" font-size="13" fill="#8b909f">invoice preview</text>
    <text x="368" y="282" text-anchor="end" font-family="'Geist Mono',monospace" font-size="14" fill="#545a6a">142,308 calls <tspan fill="#047857">-&gt;</tspan> <tspan fill="#0b0c12">$284.62</tspan></text>
  </g>
</svg>
