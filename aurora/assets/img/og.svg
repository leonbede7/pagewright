<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="78%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#3056f5" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#3056f5" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#0b0c16" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#fbfbfd"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo -->
  <g transform="translate(80,74)">
    <rect width="44" height="44" rx="11" fill="#3056f5"/>
    <g fill="#ffffff">
      <rect x="11.7" y="27.5" width="20.6" height="9" rx="4.5"/>
      <rect x="14.8" y="17.2" width="14.4" height="8.2" rx="4.1"/>
      <rect x="17.5" y="8.2" width="9" height="6.9" rx="3.4"/>
    </g>
    <text x="60" y="31" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#0b0c12">Cairn</text>
  </g>

  <!-- Headline -->
  <text x="80" y="280" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="68" font-weight="700" fill="#0b0c12" letter-spacing="-2">Your daily standup,</text>
  <text x="80" y="356" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="68" font-weight="700" fill="#0b0c12" letter-spacing="-2">written for you.</text>

  <!-- Subhead -->
  <text x="82" y="416" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="27" font-weight="400" fill="#545a6a">Automatic standups from your team's real work.</text>

  <!-- Pill -->
  <g transform="translate(82,452)">
    <rect width="318" height="46" rx="23" fill="#eef1ff"/>
    <text x="26" y="30" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="20" font-weight="600" fill="#3056f5">Less meeting. More shipping.</text>
  </g>

  <!-- Product window -->
  <g transform="translate(726,150)" filter="url(#shadow)">
    <rect width="394" height="330" rx="20" fill="#ffffff" stroke="#e6e7ee" stroke-width="1"/>
    <rect width="394" height="52" rx="20" fill="#f4f5f8"/>
    <rect y="36" width="394" height="16" fill="#f4f5f8"/>
    <circle cx="28" cy="26" r="5" fill="#c8ccd6"/>
    <circle cx="46" cy="26" r="5" fill="#d4d8e0"/>
    <circle cx="64" cy="26" r="5" fill="#dfe2e9"/>
    <text x="86" y="31" font-family="'Geist Mono','Cascadia Code',monospace" font-size="13" fill="#8b909f">#standup-engineering</text>
    <rect x="312" y="15" width="62" height="22" rx="11" fill="#eef1ff"/>
    <text x="328" y="30" font-family="'Geist Mono',monospace" font-size="12" fill="#3056f5">09:00</text>

    <!-- row 1 -->
    <circle cx="40" cy="104" r="16" fill="#eef1ff"/>
    <text x="40" y="109" text-anchor="middle" font-family="'Geist',Arial,sans-serif" font-size="13" font-weight="700" fill="#3056f5">MV</text>
    <text x="70" y="98" font-family="'Geist',Arial,sans-serif" font-size="15" font-weight="600" fill="#0b0c12">Marko Vukic</text>
    <rect x="70" y="110" width="290" height="9" rx="4.5" fill="#e9ebf1"/>
    <rect x="70" y="126" width="230" height="9" rx="4.5" fill="#eef0f5"/>

    <!-- row 2 -->
    <circle cx="40" cy="184" r="16" fill="#eef1ff"/>
    <text x="40" y="189" text-anchor="middle" font-family="'Geist',Arial,sans-serif" font-size="13" font-weight="700" fill="#3056f5">PN</text>
    <text x="70" y="178" font-family="'Geist',Arial,sans-serif" font-size="15" font-weight="600" fill="#0b0c12">Priya Nadkarni</text>
    <rect x="70" y="190" width="270" height="9" rx="4.5" fill="#e9ebf1"/>
    <rect x="70" y="206" width="200" height="9" rx="4.5" fill="#eef0f5"/>

    <!-- blocker -->
    <rect x="24" y="248" width="346" height="56" rx="12" fill="#f4f5f8"/>
    <circle cx="50" cy="276" r="9" fill="none" stroke="#3056f5" stroke-width="2"/>
    <text x="50" y="280" text-anchor="middle" font-family="'Geist',Arial,sans-serif" font-size="12" font-weight="700" fill="#3056f5">!</text>
    <text x="72" y="281" font-family="'Geist',Arial,sans-serif" font-size="13" fill="#545a6a">1 blocker: PR #479 waiting on review</text>
  </g>
</svg>
