<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="78%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#c2185b" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#c2185b" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#2a0b18" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#fbfbfd"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo -->
  <g transform="translate(80,74)">
    <circle cx="22" cy="22" r="22" fill="#c2185b"/>
    <g transform="translate(7,7)" fill="#ffffff"><path d="M12 21c0-6 2-10 8-12-1 7-4 10-8 12zM12 21C8 19 5 16 4 9c6 2 8 6 8 12z"/></g>
    <text x="58" y="31" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#0b0c12">Fern</text>
  </g>

  <!-- Headline -->
  <text x="80" y="288" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="68" font-weight="700" fill="#0b0c12" letter-spacing="-2">Keep every</text>
  <text x="80" y="362" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="68" font-weight="700" fill="#0b0c12" letter-spacing="-2">plant alive.</text>

  <!-- Subhead -->
  <text x="82" y="420" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="26" font-weight="400" fill="#545a6a">Identify, schedule, and never forget to water again.</text>

  <!-- Pill -->
  <g transform="translate(82,456)">
    <rect width="246" height="46" rx="23" fill="#fdeef4"/>
    <text x="26" y="30" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="20" font-weight="600" fill="#c2185b">Plant care, handled.</text>
  </g>

  <!-- Phone hint -->
  <g transform="translate(800,120)" filter="url(#shadow)">
    <rect width="260" height="400" rx="44" fill="#0b0c12"/>
    <rect x="10" y="10" width="240" height="380" rx="36" fill="#ffffff"/>
    <text x="34" y="62" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#0b0c12">Today</text>
    <circle cx="222" cy="55" r="15" fill="#fdeef4"/>
    <!-- plant card -->
    <rect x="30" y="84" width="200" height="150" rx="18" fill="#ffffff" stroke="#e6e7ee"/>
    <rect x="30" y="84" width="200" height="92" rx="18" fill="#8fce9b"/>
    <rect x="30" y="150" width="200" height="26" fill="#8fce9b"/>
    <text x="44" y="204" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="#0b0c12">Monstera</text>
    <text x="44" y="222" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="12" fill="#8b909f">Water today</text>
    <rect x="164" y="196" width="52" height="26" rx="13" fill="#c2185b"/>
    <text x="190" y="213" text-anchor="middle" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#ffffff">Done</text>
    <!-- list rows -->
    <rect x="30" y="252" width="200" height="50" rx="14" fill="#ffffff" stroke="#e6e7ee"/>
    <rect x="42" y="264" width="26" height="26" rx="8" fill="#9cc98a"/>
    <text x="80" y="275" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="13" font-weight="500" fill="#0b0c12">Fiddle Leaf Fig</text>
    <text x="80" y="292" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="11" fill="#8b909f">Water in 2 days</text>
    <rect x="30" y="312" width="200" height="50" rx="14" fill="#ffffff" stroke="#e6e7ee"/>
    <rect x="42" y="324" width="26" height="26" rx="8" fill="#cdbf8e"/>
    <text x="80" y="335" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="13" font-weight="500" fill="#0b0c12">Snake Plant</text>
    <text x="80" y="352" font-family="'Geist','Segoe UI',Arial,sans-serif" font-size="11" fill="#8b909f">Water in 9 days</text>
  </g>
</svg>
